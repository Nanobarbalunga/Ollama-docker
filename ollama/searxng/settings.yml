use_default_settings: true

general:
  instance_name: "Ollama Docker SearXNG"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "it"
  formats:
  - html
  - json

server:
  bind_address: "0.0.0.0"
  port: 8080
  secret_key: "change-me-searxng-secret"
  limiter: false
  image_proxy: true

ui:
  static_use_hash: true
  default_theme: simple
  query_in_title: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 20.0
